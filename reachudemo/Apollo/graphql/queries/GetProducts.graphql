query GetProducts($limit: Int!, $offset: Int!, $category: String) {
  Channel {
    GetProducts(limit: $limit, offset: $offset, category: $category) {
      id
      images {
        url
        order
        id
      }
      price {
        currency_code
        amount
        compare_at
      }
      title
      description
      category
      variants {
        id
        title
        options {
          name
          value
        }
      }
      inventory {
        available
        in_stock
      }
    }
  }
} 