query GetProductDetail($productId: Int!) {
  Channel {
    Products(product_ids: [$productId]) {
      id
      images {
        url
        order
        id
      }
      price {
        currency_code
        amount
        compare_at
      }
      title
      description
      categories {
        id
        name
      }
      variants {
        id
        title
      }
    }
  }
} 